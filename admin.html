<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bistrot Arlésien</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h1 class="text-3xl font-bold mb-8">Administration Bistrot Arlésien</h1>
    
    <div class="mb-6">
        <h2 class="text-xl font-semibold mb-3">Menu Gourmet</h2>
        <input type="text" id="menu-gourmet" class="w-full p-2 border rounded" placeholder="25,90€">
    </div>
    
    <div class="mb-6">
        <h2 class="text-xl font-semibold mb-3">Entrées</h2>
        <input type="text" id="entree-1" class="w-full p-2 border rounded mb-2" placeholder="Foie Gras Maison - 16,90€">
        <input type="text" id="entree-2" class="w-full p-2 border rounded mb-2" placeholder="Planche Charcuterie - 12,50€">
    </div>
    
    <div class="mb-6">
        <h2 class="text-xl font-semibold mb-3">Plats</h2>
        <input type="text" id="plat-1" class="w-full p-2 border rounded mb-2" placeholder="Magret de Canard - 21,00€">
        <input type="text" id="plat-2" class="w-full p-2 border rounded mb-2" placeholder="Dorade Grillée - 19,50€">
    </div>
    
    <button onclick="save()" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold">
        Enregistrer
    </button>
    
    <a href="index.html" class="block text-center mt-4 text-blue-600 hover:underline">← Retour au site</a>
</div>

<script>
function save() {
    alert('Modifications enregistrées !');
}
</script>

</body>
</html>
