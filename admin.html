<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Bistrot Arlésien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">⚙️ Administration</h1>
        <a href="index.html" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">← Retour au site</a>
    </div>

    <div class="mb-8 p-4 bg-blue-50 rounded">
        <p class="text-sm">✏️ Modifiez les prix et noms ci-dessous, puis cliquez sur "Enregistrer"</p>
    </div>

    <!-- Menus -->
    <div class="mb-8 p-6 bg-gray-50 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">📋 Menus</h2>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Menu Gourmet</label>
                <input type="text" id="menu-gourmet-price" class="w-full p-2 border rounded" placeholder="25,90€">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Menu Bistrot</label>
                <input type="text" id="menu-bistrot-price" class="w-full p-2 border rounded" placeholder="15,90€">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Menu Enfant</label>
                <input type="text" id="menu-enfant-price" class="w-full p-2 border rounded" placeholder="10,50€">
            </div>
        </div>
    </div>

    <!-- Entrées -->
    <div class="mb-8 p-6 bg-gray-50 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🥗 Entrées</h2>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="entree-1-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="entree-1-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="entree-2-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="entree-2-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="entree-3-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="entree-3-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
        </div>
    </div>

    <!-- Plats -->
    <div class="mb-8 p-6 bg-gray-50 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🍖 Plats</h2>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="plat-1-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="plat-1-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="plat-2-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="plat-2-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="plat-3-nom" class="p-2 border rounded" placeholder="Nom du plat">
                <input type="text" id="plat-3-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
        </div>
    </div>

    <!-- Burgers -->
    <div class="mb-8 p-6 bg-gray-50 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🍔 Burgers</h2>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="burger-1-nom" class="p-2 border rounded" placeholder="Nom du burger">
                <input type="text" id="burger-1-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="burger-2-nom" class="p-2 border rounded" placeholder="Nom du burger">
                <input type="text" id="burger-2-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
        </div>
    </div>

    <!-- Desserts -->
    <div class="mb-8 p-6 bg-gray-50 rounded-lg">
        <h2 class="text-2xl font-bold mb-4">🍰 Desserts</h2>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="dessert-1-nom" class="p-2 border rounded" placeholder="Nom du dessert">
                <input type="text" id="dessert-1-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="dessert-2-nom" class="p-2 border rounded" placeholder="Nom du dessert">
                <input type="text" id="dessert-2-prix" class="p-2 border rounded" placeholder="Prix">
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-4">
        <button onclick="saveData()" class="flex-1 bg-green-600 text-white py-3 px-6 rounded-lg hover:bg-green-700 font-bold">
            💾 Enregistrer les modifications
        </button>
        <button onclick="resetData()" class="bg-red-600 text-white py-3 px-6 rounded-lg hover:bg-red-700">
            🔄 Réinitialiser
        </button>
    </div>

    <div id="status" class="mt-4 p-3 rounded hidden"></div>
</div>

<script>
// Load existing data
window.onload = function() {
    const saved = localStorage.getItem('bistrotData');
    if (saved) {
        const data = JSON.parse(saved);
        Object.keys(data).forEach(id => {
            const input = document.getElementById(id);
            if (input) input.value = data[id];
        });
    }
};

// Save data
function saveData() {
    const data = {};
    const inputs = document.querySelectorAll('input[type="text"]');
    
    inputs.forEach(input => {
        if (input.value.trim()) {
            data[input.id] = input.value.trim();
        }
    });
    
    localStorage.setItem('bistrotData', JSON.stringify(data));
    
    showStatus('✅ Modifications enregistrées ! Retournez sur le site pour voir les changements.', 'success');
}

// Reset data
function resetData() {
    if (confirm('Êtes-vous sûr de vouloir réinitialiser tous les champs ?')) {
        localStorage.removeItem('bistrotData');
        location.reload();
    }
}

// Show status message
function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = 'mt-4 p-3 rounded';
    
    if (type === 'success') {
        statusDiv.className += ' bg-green-100 text-green-800';
    } else if (type === 'error') {
        statusDiv.className += ' bg-red-100 text-red-800';
    }
    
    statusDiv.classList.remove('hidden');
    setTimeout(() => statusDiv.classList.add('hidden'), 5000);
}
</script>

</body>
</html>
